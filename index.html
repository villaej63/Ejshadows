<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlimited AI Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .neon { text-shadow: 0 0 15px #10b981; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold neon text-emerald-400">UNLIMITED AI HUB</h1>
      <p class="text-emerald-400 mt-2">GPT-4o • Claude • Grok • Gemini • Unlimited Images</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- Chat Card -->
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-comment-dots"></i> AI Chat
        </h2>
        <div id="chat" class="h-96 overflow-y-auto bg-zinc-950 border border-zinc-800 rounded-2xl p-4 mb-4 space-y-4 text-sm"></div>
        <div class="flex gap-2">
          <input id="chat-input" type="text" placeholder="Ask anything..." 
                 class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-400">
          <button onclick="sendMessage()" 
                  class="bg-emerald-400 hover:bg-emerald-500 text-black px-6 rounded-2xl font-medium">Send</button>
        </div>
        <button onclick="openSettings()" class="mt-4 w-full text-xs text-zinc-400 hover:text-white">
          ⚙️ Add your free API key (required for smart responses)
        </button>
      </div>

      <!-- Image Card -->
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-image"></i> Image Studio
        </h2>
        <textarea id="prompt" rows="3" placeholder="Describe the image you want..." 
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4 focus:outline-none focus:border-emerald-400"></textarea>
        
        <div class="flex flex-wrap gap-2 my-4">
          <button onclick="quickPrompt('cyberpunk city night flying cars')" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">Cyberpunk City</button>
          <button onclick="quickPrompt('beautiful anime girl warrior')" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">Anime Warrior</button>
          <button onclick="quickPrompt('epic fantasy dragon')" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">Fantasy Dragon</button>
        </div>

        <button onclick="generateImage()" 
                class="w-full bg-gradient-to-r from-emerald-400 to-cyan-400 text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Image
        </button>

        <div id="image-area" class="mt-6 hidden">
          <img id="generated-img" class="w-full rounded-2xl border border-zinc-700" alt="Generated image">
          <div class="flex gap-4 mt-4">
            <button onclick="downloadImg()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl">Download</button>
            <button onclick="generateImage()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl">Regenerate</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Simple Settings -->
  <div id="modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center">
    <div class="bg-zinc-900 rounded-3xl p-8 max-w-sm w-full mx-4">
      <h3 class="text-xl font-semibold mb-4">Free API Key</h3>
      <p class="text-zinc-400 text-sm mb-4">Get it free at <a href="https://enter.pollinations.ai" target="_blank" class="text-emerald-400 underline">enter.pollinations.ai</a></p>
      <input id="key-input" type="password" placeholder="pk_xxxxxxxxxxxxxxxx" 
             class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 mb-6">
      <div class="flex gap-3">
        <button onclick="saveKey()" class="flex-1 bg-emerald-400 text-black py-3 rounded-2xl font-medium">Save Key</button>
        <button onclick="closeModal()" class="flex-1 border border-zinc-700 py-3 rounded-2xl">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let apiKey = localStorage.getItem("aiKey") || "";

    function openSettings() {
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("key-input").value = apiKey;
    }

    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }

    function saveKey() {
      apiKey = document.getElementById("key-input").value.trim();
      localStorage.setItem("aiKey", apiKey);
      closeModal();
      addMessage("system", "✅ API key saved! You can now chat with real models.");
    }

    function addMessage(sender, text) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = sender === "user" ? "text-right" : "text-left";
      div.innerHTML = `
        <div class="${sender === "user" ? "bg-emerald-500 text-black ml-auto" : "bg-zinc-800"} inline-block max-w-[80%] px-4 py-3 rounded-2xl">
          ${text}
        </div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;

      addMessage("user", text);
      input.value = "";

      if (!apiKey) {
        addMessage("system", "⚠️ Please add your free API key in settings first.");
        return;
      }

      addMessage("ai", "Thinking...");

      try {
        const res = await fetch("https://gen.pollinations.ai/v1/chat/completions", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${apiKey}`
          },
          body: JSON.stringify({
            model: "gpt-4o",
            messages: [{ role: "user", content: text }],
            temperature: 0.8
          })
        });

        const data = await res.json();
        const reply = data.choices?.[0]?.message?.content || "Sorry, I couldn't get a response.";
        
        // Remove "Thinking..." and add real reply
        const chat = document.getElementById("chat");
        chat.removeChild(chat.lastChild);
        addMessage("ai", reply);
