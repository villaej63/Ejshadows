<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>My AI</title>
  <style>
    body { font-family: Arial; background:#111; color:#fff; margin:0; }
    .wrap { max-width:600px; margin:auto; padding:10px; }
    #chat { height:70vh; overflow:auto; border:1px solid #333; padding:10px; }
    .user { color:#4fc3f7; margin:8px 0; }
    .ai { color:#81c784; margin:8px 0; }
    input { width:75%; padding:10px; }
    button { padding:10px; }
  </style>
</head>

<body>
<div class="wrap">
  <h2>⚡ My AI Assistant</h2>

  <div id="chat"></div>

  <input id="msg" placeholder="Ask something..." />
  <button onclick="send()">Send</button>
</div>

<script>
async function send() {
  const input = document.getElementById("msg");
  const chat = document.getElementById("chat");

  const text = input.value;
  input.value = "";

  chat.innerHTML += `<div class="user">You: ${text}</div>`;

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();

  chat.innerHTML += `<div class="ai">AI: ${data.reply}</div>`;
  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
