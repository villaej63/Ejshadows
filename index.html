<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI Pro</title>

<style>
body { background:#0b0b0b; color:white; font-family:Arial; margin:0; }
.container { max-width:600px; margin:auto; padding:10px; }
#chat { height:70vh; overflow:auto; border:1px solid #333; padding:10px; border-radius:10px; }
.user { color:#4fc3f7; margin:8px 0; }
.ai { color:#81c784; margin:8px 0; }
input { width:70%; padding:10px; }
button { padding:10px; margin:5px; }
img { width:100%; border-radius:10px; margin-top:10px; }
</style>
</head>

<body>

<div class="container">
<h2>⚡ AI Pro Assistant</h2>

<div id="chat"></div>

<input id="msg" placeholder="Ask or type image:..." />
<button onclick="send()">Send</button>
<button onclick="image()">Image</button>
</div>

<script>

const chat = document.getElementById("chat");

function add(text, cls) {
  chat.innerHTML += `<div class="${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  input.value = "";

  add("You: " + text, "user");

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  add("AI: " + data.reply, "ai");
}

async function image() {
  const input = document.getElementById("msg");
  const prompt = input.value;
  input.value = "";

  add("🎨 Creating image: " + prompt, "ai");

  const res = await fetch("/api/image", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  add(`<img src="${data.image}" />`, "ai");
}

</script>

</body>
</html>
