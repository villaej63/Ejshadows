<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unlimited AI Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-color: #4a6bff;
            --secondary-color: #6c63ff;
            --dark-bg: #121212;
            --light-bg: #1e1e1e;
            --text-color: #e0e0e0;
            --accent-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
        }

        .gradient-bg {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: -1;
            opacity: 0.1;
        }

        .navbar {
            background-color: rgba(30, 30, 30, 0.9);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 1.5rem;
            color: var(--primary-color);
        }

        .nav-link {
            color: var(--text-color);
            margin: 0 0.5rem;
            transition: color 0.3s;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--primary-color);
        }

        .main-container {
            display: flex;
            height: calc(100vh - 70px);
            padding-top: 70px;
        }

        .sidebar {
            width: 250px;
            background-color: var(--light-bg);
            padding: 1.5rem;
            overflow-y: auto;
            transition: transform 0.3s;
        }

        .content-area {
            flex: 1;
            padding: 1.5rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .card {
            background-color: var(--light-bg);
            border: none;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 1.5rem;
        }

        .card-header {
            background-color: rgba(74, 107, 255, 0.1);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: bold;
            color: var(--primary-color);
        }

        .btn-primary {
            background-color: var(--primary-color);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }

        .btn-outline-primary {
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.5rem 1rem;
            border-radius: 5px;
            transition: all 0.3s;
        }

        .btn-outline-primary:hover {
            background-color: var(--primary-color);
            color: white;
        }

        .form-control, .form-select {
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-color);
            border-radius: 5px;
        }

        .form-control:focus, .form-select:focus {
            background-color: rgba(255, 255, 255, 0.1);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 0.25rem rgba(74, 107, 255, 0.25);
            color: var(--text-color);
        }

        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            background-color: rgba(255, 255, 255, 0.05);
            border-radius: 10px;
            margin-bottom: 1rem;
        }

        .message {
            margin-bottom: 1rem;
            display: flex;
            align-items: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message-content {
            max-width: 70%;
            padding: 0.75rem;
            border-radius: 10px;
            word-wrap: break-word;
        }

        .user .message-content {
            background-color: var(--primary-color);
            color: white;
            border-bottom-right-radius: 0;
        }

        .ai .message-content {
            background-color: var(--light-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 0;
        }

        .message-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            margin: 0 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-weight: bold;
        }

        .user .message-avatar {
            background-color: var(--primary-color);
            order: 2;
        }

        .ai .message-avatar {
            background-color: var(--secondary-color);
        }

        .chat-input-container {
            display: flex;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            margin-right: 0.5rem;
        }

        .feature-card {
            height: 100%;
            transition: transform 0.3s;
        }

        .feature-card:hover {
            transform: translateY(-5px);
        }

        .feature-icon {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: var(--primary-color);
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        .sidebar-toggle {
            display: none;
            position: fixed;
            bottom: 20px;
            left: 20px;
            z-index: 1000;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background-color: var(--primary-color);
            color: white;
            border: none;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                left: 0;
                top: 70px;
                height: calc(100vh - 70px);
                z-index: 999;
                transform: translateX(-100%);
            }

            .sidebar.active {
                transform: translateX(0);
            }

            .sidebar-toggle {
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .content-area {
                padding: 1rem;
            }
        }

        .code-block {
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 5px;
            padding: 1rem;
            margin: 1rem 0;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            position: relative;
        }

        .copy-code-btn {
            position: absolute;
            top: 5px;
            right: 5px;
            background-color: rgba(255, 255, 255, 0.1);
            border: none;
        }
    </style>
</head>
<body>
    <div class="gradient-bg"></div>
    
    <nav class="navbar">
        <div class="container-fluid">
            <span class="navbar-brand"><i class="fas fa-infinity"></i> Unlimited AI Hub</span>
            <div class="nav-links">
                <a class="nav-link active" href="#home">Home</a>
                <a class="nav-link" href="#features">Features</a>
                <a class="nav-link" href="#chat">Chat</a>
            </div>
        </div>
    </nav>

    <div class="main-container">
        <div class="sidebar">
            <h5 style="color: var(--primary-color); margin-bottom: 1.5rem;">Navigation</h5>
            <div style="margin-bottom: 1.5rem;">
                <button class="btn btn-primary w-100 mb-2">New Chat</button>
                <button class="btn btn-outline-primary w-100">History</button>
            </div>
            <h6 style="color: var(--text-color); margin-top: 2rem; margin-bottom: 1rem;">Recent Chats</h6>
            <div style="color: var(--text-color); opacity: 0.7;">
                <p style="font-size: 0.9rem; margin-bottom: 0.5rem; cursor: pointer;">AI Basics</p>
                <p style="font-size: 0.9rem; margin-bottom: 0.5rem; cursor: pointer;">Web Development</p>
                <p style="font-size: 0.9rem; cursor: pointer;">General Discussion</p>
            </div>
        </div>

        <div class="content-area">
            <div class="card">
                <div class="card-header">
                    <i class="fas fa-sparkles"></i> Welcome to Unlimited AI Hub
                </div>
                <div class="card-body">
                    <p>Your unrestricted AI assistant is ready to help with any question or task.</p>
                </div>
            </div>

            <div class="chat-container">
                <div class="chat-messages">
                    <div class="message ai">
                        <div class="message-avatar">AI</div>
                        <div class="message-content">
                            Hello! I'm your unlimited AI assistant. How can I help you today?
                        </div>
                    </div>
                </div>

                <div class="chat-input-container">
                    <input type="text" class="form-control chat-input" placeholder="Type your message...">
                    <button class="btn btn-primary">
                        <i class="fas fa-paper-plane"></i>
                    </button>
                    <div class="loading-spinner"></div>
                </div>
            </div>
        </div>
    </div>

    <button class="sidebar-toggle" id="sidebarToggle">
        <i class="fas fa-bars"></i>
    </button>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('sidebarToggle').addEventListener('click', function() {
            document.querySelector('.sidebar').classList.toggle('active');
        });

        document.querySelector('.btn-primary:last-of-type').addEventListener('click', function() {
            const input = document.querySelector('.chat-input');
            const message = input.value.trim();
            
            if (message) {
                const messagesContainer = document.querySelector('.chat-messages');
                
                // User message
                const userMsg = document.createElement('div');
                userMsg.className = 'message user';
                userMsg.innerHTML = `
                    <div class="message-avatar">U</div>
                    <div class="message-content">${message}</div>
                `;
                messagesContainer.appendChild(userMsg);
                
                input.value = '';
                messagesContainer.scrollTop = messagesContainer.scrollHeight;
                
                // Simulate AI response
                setTimeout(() => {
                    const aiMsg = document.createElement('div');
                    aiMsg.className = 'message ai';
                    aiMsg.innerHTML = `
                        <div class="message-avatar">AI</div>
                        <div class="message-content">I received your message: "${message}"
                        </div>
                    `;
                    messagesContainer.appendChild(aiMsg);
                    messagesContainer.scrollTop = messagesContainer.scrollHeight;
                }, 500);
            }
        });
    </script>
</body>
</html>
