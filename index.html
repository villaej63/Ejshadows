<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unlimited AI Hub • Free Forever</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .neon { text-shadow: 0 0 15px #10b981; }
  </style>
</head>
<body class="bg-zinc-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <div class="text-center mb-10">
      <h1 class="text-5xl font-bold neon text-emerald-400">UNLIMITED AI HUB</h1>
      <p class="text-emerald-400 mt-2">Free Forever • No Key • No Limits (as much as public AI allows)</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
      <!-- AI Chat -->
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-comment-dots"></i> AI Chat (Free Mode)
        </h2>
        <div id="chat" class="h-96 overflow-y-auto bg-zinc-950 border border-zinc-800 rounded-2xl p-4 mb-4 space-y-4 text-sm"></div>
        
        <div class="flex gap-2">
          <input id="chat-input" type="text" placeholder="Ask anything... (free mode)" 
                 class="flex-1 bg-zinc-800 border border-zinc-700 rounded-2xl px-5 py-3 focus:outline-none focus:border-emerald-400">
          <button onclick="sendMessage()" 
                  class="bg-emerald-400 hover:bg-emerald-500 text-black px-6 rounded-2xl font-medium">Send</button>
        </div>
      </div>

      <!-- Image Studio -->
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <h2 class="text-2xl font-semibold mb-4 flex items-center gap-2">
          <i class="fa-solid fa-image"></i> Image Studio (Free & Unlimited)
        </h2>
        <textarea id="prompt" rows="3" placeholder="Describe the image you want (no key needed)..." 
                  class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl p-4 focus:outline-none focus:border-emerald-400"></textarea>
        
        <div class="flex flex-wrap gap-2 my-4">
          <button onclick="quickPrompt('cyberpunk city night flying cars')" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">Cyberpunk City</button>
          <button onclick="quickPrompt('beautiful anime girl warrior')" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">Anime Warrior</button>
          <button onclick="quickPrompt('epic fantasy dragon')" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">Fantasy Dragon</button>
          <button onclick="quickPrompt('realistic portrait of a hacker in neon room')" class="text-xs bg-zinc-800 hover:bg-zinc-700 px-4 py-2 rounded-xl">Hacker Portrait</button>
        </div>

        <button onclick="generateImage()" 
                class="w-full bg-gradient-to-r from-emerald-400 to-cyan-400 text-black font-bold py-4 rounded-2xl flex items-center justify-center gap-2">
          <i class="fa-solid fa-wand-magic-sparkles"></i> Generate Image (Free)
        </button>

        <div id="image-area" class="mt-6 hidden">
          <img id="generated-img" class="w-full rounded-2xl border border-zinc-700" alt="Generated image">
          <div class="flex gap-4 mt-4">
            <button onclick="downloadImg()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl">Download</button>
            <button onclick="generateImage()" class="flex-1 bg-zinc-800 hover:bg-zinc-700 py-3 rounded-2xl">Regenerate</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    function addMessage(sender, text) {
      const chat = document.getElementById("chat");
      const div = document.createElement("div");
      div.className = sender === "user" ? "text-right" : "text-left";
      div.innerHTML = `<div class="${sender === "user" ? "bg-emerald-500 text-black ml-auto" : "bg-zinc-800"} inline-block max-w-[80%] px-4 py-3 rounded-2xl">${text}</div>`;
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
    }

    async function sendMessage() {
      const input = document.getElementById("chat-input");
      const text = input.value.trim();
      if (!text) return;
      
      addMessage("user", text);
      input.value = "";

      addMessage("ai", "Thinking in free mode...");

      try {
        // Free text endpoint fallback
        const res = await fetch(`https://text.pollinations.ai/${encodeURIComponent(text)}`);
        const reply = await res.text();
        
        const chat = document.getElementById("chat");
        chat.removeChild(chat.lastChild);
        addMessage("ai", reply || "Free mode response received! (Try more creative prompts if short)");
      } catch (e) {
        const chat = document.getElementById("chat");
        chat.removeChild(chat.lastChild);
        addMessage("ai", "Free chat hit a limit or is slow right now.<br><br>Try a different prompt or come back later — images still work great!");
      }
    }

    let currentImgUrl = "";
    function quickPrompt(text) { 
      document.getElementById("prompt").value = text; 
    }

    async function generateImage() {
      let prompt = document.getElementById("prompt").value.trim() || "beautiful cyberpunk city at night";
      const area = document.getElementById("image-area");
      const img = document.getElementById("generated-img");
      area.classList.remove("hidden");
      img.src = "";

      // Public no-key image endpoint
      const url = `https://gen.pollinations.ai/image/${encodeURIComponent(prompt)}?width=1024&height=1024&nologo=true&model=flux`;
      
      currentImgUrl = url;
      img.src = url;
    }

    function downloadImg() {
      if (!currentImgUrl) return;
      const a = document.createElement("a");
      a.href = currentImgUrl;
      a.download = "free-ai-image.png";
      a.click();
    }

    window.onload = () => {
      addMessage("ai", "Hello PLAYA! 🔥<br><br>Free Forever mode activated.<br>No API key needed.<br>Images should generate instantly.<br>Chat is best-effort free public mode.<br>Ask me anything!");
    };
  </script>
</body>
</html>
