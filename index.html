<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI System</title>

<style>
body { font-family: Arial; background:#0f0f0f; color:white; text-align:center; }
#chat { height:55vh; overflow:auto; border:1px solid #333; padding:10px; margin-bottom:10px; }
.user { color:#4fc3f7; }
.ai { color:#81c784; }
img { max-width:100%; margin-top:10px; border-radius:10px; }
button { padding:10px; margin:5px; }
input { width:70%; padding:10px; }
</style>
</head>

<body>

<h2>⚡ My AI System</h2>

<div id="chat"></div>

<input id="msg" placeholder="Ask or type image:cat in space" />
<button onclick="send()">Send</button>
<button onclick="genImage()">Image</button>

<script>

const chat = document.getElementById("chat");

function add(text, cls) {
  chat.innerHTML += `<div class="${cls}">${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
}

async function send() {
  const input = document.getElementById("msg");
  const text = input.value;
  input.value = "";

  add("You: " + text, "user");

  const res = await fetch("/api/chat", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ message: text })
  });

  const data = await res.json();
  add("AI: " + data.reply, "ai");
}

async function genImage() {
  const input = document.getElementById("msg");
  const prompt = input.value;

  input.value = "";

  add("🎨 Generating image: " + prompt, "ai");

  const res = await fetch("/api/image", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({ prompt })
  });

  const data = await res.json();

  add(`<img src="${data.image}" />`, "ai");
}

</script>

</body>
</html>
